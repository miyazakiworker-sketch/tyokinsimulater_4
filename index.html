<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未来貯金シミュレーター 2.0</title>
  <style>
    /* ココアさん標準：PC真ん中寄せ・スマホ完全フィット・極上黒モード */
    body {
      background-color: #12161a;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      color: #e2e8f0;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 440px;
      width: 100%;
      background: #1a202c;
      padding: 25px 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid #2d3748;
      box-sizing: border-box;
      text-align: center;
    }
    h1 {
      font-size: 1.3rem;
      color: #3182ce;
      margin-top: 0;
      margin-bottom: 20px;
      border-bottom: 3px solid #3182ce;
      padding-bottom: 10px;
    }
    label {
      font-weight: bold;
      font-size: 13px;
      color: #a0aec0;
      display: block;
      text-align: left;
      margin-top: 15px;
    }
    .input-group {
      display: flex;
      align-items: center;
      margin-top: 6px;
    }
    input {
      flex: 1;
      padding: 10px 12px;
      background-color: #12161a;
      border: 2px solid #4a5568;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      text-align: right;
    }
    input:focus { border-color: #3182ce; }
    .unit { margin-left: 10px; font-weight: bold; font-size: 13px; color: #a0aec0; width: 35px; text-align: left; }
    
    #calc-btn, #copy-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: background 0.2s;
    }
    #calc-btn { background-color: #3182ce; color: white; }
    #calc-btn:hover { background-color: #2b6cb0; }
    #copy-btn { background-color: #1da1f2; color: white; margin-top: 15px; }
    #copy-btn:hover { background-color: #4ab3f4; }

    .result-box {
      display: none;
      background-color: #12161a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      text-align: left;
      border: 1px solid #2d3748;
    }
    .result-title { font-weight: bold; color: #fff; font-size: 14px; margin-bottom: 10px; border-left: 4px solid #3182ce; padding-left: 8px; }
    .result-value { font-size: 13px; margin-bottom: 8px; color: #cbd5e0; }
    .highlight { color: #e53e3e; font-weight: bold; font-size: 16px; }
    .unearned { color: #38a169; font-weight: bold; font-size: 16px; }

    .ad-space-box {
      width: 100%; max-width: 440px; background-color: #1a202c; border: 2px dashed #2d3748; border-radius: 12px; padding: 15px; text-align: center; color: #718096; margin-top: 20px; box-sizing: border-box;
    }
    .ad-label { font-size: 10px; font-weight: bold; color: #4a5568; margin-bottom: 5px; }
    .ad-text { font-size: 11px; color: #718096; line-height: 1.4; }

    .footer-link { text-align: center; margin-top: 20px; font-size: 12px; }
    .footer-link a { color: #3182ce; text-decoration: none; font-weight: bold; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <h1>💰 未来貯金シミュレーター 2.0</h1>
  
  <!-- 【復活】目標金額の入力欄 -->
  <label>① 目標金額</label>
  <div class="input-group">
    <input type="number" id="target-input" value="1000" min="0">
    <span class="unit">万円</span>
  </div>

  <!-- 元の機能 -->
  <label>② 毎月の積立・貯金額</label>
  <div class="input-group">
    <input type="number" id="monthly-input" value="10" min="0">
    <span class="unit">万円</span>
  </div>

  <!-- 【新設】複利運用のための年利設定 -->
  <label>③ 想定年利（新NISA運用など ※0%で純粋貯金）</label>
  <div class="input-group">
    <input type="number" id="rate-input" value="5" min="0" step="0.1">
    <span class="unit">％</span>
  </div>

  <button id="calc-btn">目標達成までの未来を一瞬で計算！</button>

  <!-- 計算結果出力ボックス -->
  <div id="result-box" class="result-box">
    <div class="result-title">シミュレーション結果</div>
    
    <!-- 【復活・超強化】目標達成までの残り年数 -->
    <div class="result-value">🎯 目標達成までの期間: <span id="res-years" class="highlight">0</span> 年</div>
    <div class="result-value">その時の純貯金総額（元本）: <span id="res-savings" style="font-weight:bold;">0</span> 万円</div>
    
    <!-- 新機能 -->
    <div class="result-value" style="border-top: 1px dashed #2d3748; padding-top: 10px; margin-top: 10px;">
      🌿 達成後の毎月の不労所得（年利4%ルール換算）: <span id="res-unearned" class="unearned">0</span> 万円 / 月
    </div>
    
    <button id="copy-btn">この結果をコピーして不労所得計画を報告 📋</button>
  </div>
</div>

<!-- 将来の不労所得用広告スペース -->
<div class="ad-space-box">
  <div class="ad-label">Sponsored</div>
  <div class="ad-text">※当サイトは開発費・サーバー維持費のために広告を掲載予定です。</div>
</div>

<!-- ココアさんの公式看板リンク -->
<div class="footer-link">
  開発者：<a href="https://x.com" target="_blank">ココア (@cocoa_next7)</a>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const targetInput = document.getElementById("target-input");
    const monthlyInput = document.getElementById("monthly-input");
    const rateInput = document.getElementById("rate-input");
    const calcBtn = document.getElementById("calc-btn");
    const resultBox = document.getElementById("result-box");
    
    const resYears = document.getElementById("res-years");
    const resSavings = document.getElementById("res-savings");
    const resUnearned = document.getElementById("res-unearned");
    const copyBtn = document.getElementById("copy-btn");

    let shareText = "";

    calcBtn.addEventListener("click", () => {
      const target = parseFloat(targetInput.value) || 0;
      const monthly = parseFloat(monthlyInput.value) || 0;
      const annualRate = parseFloat(rateInput.value) || 0;

      if (target <= 0 || monthly <= 0) {
        alert("⚠️ 目標金額と毎月の積立額を正しく入力してください！");
        return;
      }

      const monthlyRate = (annualRate / 100) / 12;
      let totalAsset = 0;
      let monthsCount = 0;

      // 目標金額に到達するまで毎月複利でシミュレーションを回す（最大100年＝1200ヶ月で安全ストップ）
      if (monthlyRate === 0) {
        monthsCount = Math.ceil(target / monthly);
        totalAsset = monthsCount * monthly;
      } else {
        while (totalAsset < target && monthsCount < 1200) {
          totalAsset = (totalAsset + monthly) * (1 + monthlyRate);
          monthsCount++;
        }
      }

      const calcYears = (monthsCount / 12).toFixed(1);
      const pureSavings = monthly * monthsCount;

      // 達成した総資産額から、毎月の不労所得（4%ルール）を逆算
      const unearnedMonthly = (totalAsset * 0.04) / 12;

      // 画面反映
      resYears.innerText = calcYears;
      resSavings.innerText = Math.round(pureSavings).toLocaleString();
      resUnearned.innerText = Math.round(unearnedMonthly).toLocaleString();

      shareText = `【未来貯金シミュレーター結果】\n目標${target}万円まで毎月${monthly}万積立(年利${annualRate}%)\n・達成期間: ${calcYears}年\n・積立元本: ${Math.round(pureSavings).toLocaleString()}万円\n・達成後の不労所得: 約${Math.round(unearnedMonthly).toLocaleString()}万円/月\nアプデ後もURLは一生同じ！`;

      resultBox.style.display = "block";
    });

    copyBtn.addEventListener("click", () => {
      if (!shareText) return;
      navigator.clipboard.writeText(shareText).then(() => {
        alert("📋 将来の不労所得計画をコピーしました！");
      }).catch(() => {
        alert("⚠️ コピーに失敗しました。");
      });
    });
  });
</script>

</body>
</html>
