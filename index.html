<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フリーランス独立計画！ココアの未来貯金シミュレーター</title>
    <style>
        body {
            background-color: #f5f6fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #2f3640;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: white;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;       
            max-width: 440px;  
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: #2f3542;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 3px solid #70a1ff;
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            font-size: 13px;
            font-weight: bold;
            color: #57606f;
            width: 55%;
        }

        .input-group input {
            width: 40%;
            padding: 8px 12px;
            border: 2px solid #ced6e0;
            border-radius: 8px;
            font-size: 14px;
            text-align: right;
            outline: none;
        }

        #calc-btn {
            background-color: #70a1ff;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(112, 161, 255, 0.3);
        }

        .result-box {
            display: none; 
            background-color: #f1f2f6;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: left;
        }

        .result-title {
            font-weight: bold;
            color: #2f3542;
            font-size: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #2ed573;
            padding-left: 8px;
        }

        .result-value {
            font-size: 14px;
            margin-bottom: 8px;
            color: #57606f;
        }

        .highlight {
            color: #ff4757;
            font-weight: bold;
            font-size: 17px;
        }

        #copy-btn {
            background-color: #1da1f2;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .ad-space-box {
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            background-color: #f1f2f6;
            border: 2px dashed #ced6e0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .ad-label { font-size: 11px; font-weight: bold; color: #a4b0be; margin-bottom: 5px; }
        .ad-placeholder-text { font-size: 12px; color: #a4b0be; line-height: 1.4; }
    </style>
</head>
    <!-- 【開発者看板リンク】これを追加するだけで自動でXに繋がります -->
    <div style="text-align: center; margin-top: 20px;">
        <a href="https://x.com/cocoa_next7" target="_blank" style="font-size: 12px; color: #3498db; text-decoration: none; font-weight: bold;">
            🛠️ 開発者：ココア (プロのフリーランスへの成長記録はコチラ) 🛠️
        </a>
    </div>

    <body>

    <div class="container">
        <h1>ココアの未来貯金シミュレーター</h1>
        
        <div class="input-group">
            <label>① 毎月の手取り収入 (円)</label>
            <input type="number" id="income" value="200000" min="0">
        </div>

        <div class="input-group">
            <label>② 家賃・光熱費 (円)</label>
            <input type="number" id="rent" value="70000" min="0">
        </div>

        <div class="input-group">
            <label>③ 食費・生活費 (円)</label>
            <input type="number" id="food" value="40000" min="0">
        </div>

        <div class="input-group">
            <label>④ 趣味・PC・交際費 (円)</label>
            <input type="number" id="hobby" value="30000" min="0">
        </div>

        <div class="input-group" style="margin-top: 25px; border-top: 1px dashed #ced6e0; padding-top: 15px;">
            <label style="color: #ff4757;">🎯 独立のための目標貯金額 (円)</label>
            <input type="number" id="target" value="1000000" min="0">
        </div>

        <button id="calc-btn">未来をシミュレートする！</button>

        <div id="result-box" class="result-box">
            <div class="result-title">シミュレーション結果</div>
            <div class="result-value">毎月の純貯金額: <span id="res-surplus" class="highlight" style="color:#2ed573;">0</span> 円</div>
            <div class="result-value">目標達成まで: <span id="res-months" class="highlight">0</span> ヶ月</div>
            
            <div id="res-advice" style="margin-top: 15px; font-size: 13px; color: #747d8c; line-height: 1.4; border-top: 1px solid #ced6e0; padding-top: 10px;"></div>

            <button id="copy-btn">報告文をコピーする 📋</button>
        </div>
    </div>

    <div class="ad-space-box">
        <div class="ad-label">Sponsored</div>
        <div class="ad-placeholder-text">
            ※当サイトは開発費・サーバー維持費のために広告を掲載予定です。<br>
            応援よろしくお願いいたします！
        </div>
    </div>

    <script>
    // 画面が完全に読み込まれてから安全に作動させるプロ仕様の動線
    window.addEventListener('DOMContentLoaded', () => {
        const monthlyInput = document.getElementById("monthly-input"); // 毎月の積立額
        const yearsInput = document.getElementById("years-input");     // 積立期間
        const rateInput = document.getElementById("rate-input");       // 想定年利
        const calcBtn = document.getElementById("calc-btn");
        const resultBox = document.getElementById("result-box");

        // 出力用パーツ
        const resSavings = document.getElementById("res-savings");
        const resTotal = document.getElementById("res-total");
        const resUnearned = document.getElementById("res-unearned");
        const copyBtn = document.getElementById("copy-btn");

        let shareText = "";

        if (calcBtn) {
            calcBtn.addEventListener("click", () => {
                const monthly = parseFloat(monthlyInput.value) || 0;
                const years = parseFloat(yearsInput.value) || 0;
                const annualRate = parseFloat(rateInput.value) || 0;

                if (monthly <= 0 || years <= 0) {
                    alert("⚠️ 毎月の積立額と期間を正しく入力してください！");
                    return;
                }

                // 1. 通常貯金（ただ現金を貯めた場合）
                const totalMonths = years * 12;
                const pureSavings = monthly * totalMonths;

                // 2. 複利計算ロジック（年利を月利に変換して毎月積立投資）
                let totalAsset = 0;
                const monthlyRate = (annualRate / 100) / 12;

                if (monthlyRate === 0) {
                    totalAsset = pureSavings;
                } else {
                    for (let i = 0; i < totalMonths; i++) {
                        totalAsset = (totalAsset + monthly) * (1 + monthlyRate);
                    }
                }

                // 3. 不労所得（年利4%ルールで切り崩した場合の「毎月の不労所得額」を逆算）
                // 資産 × 4% ÷ 12ヶ月
                const unearnedMonthly = (totalAsset * 0.04) / 12;

                // 画面への数値反映（万円単位に変換して綺麗にトリミング）
                if (resSavings) resSavings.innerText = Math.round(pureSavings).toLocaleString();
                if (resTotal) resTotal.innerText = Math.round(totalAsset).toLocaleString();
                if (resUnearned) resUnearned.innerText = Math.round(unearnedMonthly).toLocaleString();

                // X用コピペテキストの自動生成（140文字対応のショート版）
                shareText = `【未来貯金シミュレーター結果】\n` +
                            `毎月${monthly}万円を${years}年間運用\n` +
                            `・ただの貯金: ${Math.round(pureSavings).toLocaleString()}万円\n` +
                            `・投資運用後: ${Math.round(totalAsset).toLocaleString()}万円🔥\n` +
                            `・毎月の不労所得: 約${Math.round(unearnedMonthly).toLocaleString()}万円\n` +
                            `アプデ後も一生同じURL！`;

                // 結果ボックスをシュパッと表示
                if (resultBox) resultBox.style.display = "block";
            });
        }

        // Xコピー機能
        if (copyBtn) {
            copyBtn.addEventListener("click", () => {
                if (!shareText) return;
                navigator.clipboard.writeText(shareText).then(() => {
                    alert("📋 将来の資産計画をクリップボードにコピーしました！");
                }).catch(() => {
                    alert("⚠️ コピーに失敗しました。");
                });
            });
        }
    });
</script>

</body>
</html>
