<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未来貯金シミュレーター 2.5</title>
  <style>
    /* ココアさん標準：PC真ん中寄せ・スマホ完全フィット・極上黒モード */
    body {
      background-color: #12161a;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      color: #e2e8f0;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 440px;
      width: 100%;
      background: #1a202c;
      padding: 25px 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid #2d3748;
      box-sizing: border-box;
      text-align: center;
    }
    h1 {
      font-size: 1.3rem;
      color: #3182ce;
      margin-top: 0;
      margin-bottom: 20px;
      border-bottom: 3px solid #3182ce;
      padding-bottom: 10px;
    }
    .section-title {
      font-size: 0.95rem;
      color: #fff;
      text-align: left;
      margin-top: 20px;
      margin-bottom: 5px;
      border-left: 4px solid #3182ce;
      padding-left: 8px;
      font-weight: bold;
    }
    label {
      font-weight: bold;
      font-size: 12px;
      color: #a0aec0;
      display: block;
      text-align: left;
      margin-top: 10px;
    }
    .input-group {
      display: flex;
      align-items: center;
      margin-top: 4px;
    }
    input {
      flex: 1;
      padding: 10px 12px;
      background-color: #12161a;
      border: 2px solid #4a5568;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      text-align: right;
    }
    input:focus { border-color: #3182ce; }
    .unit { margin-left: 10px; font-weight: bold; font-size: 13px; color: #a0aec0; width: 35px; text-align: left; }
    
    #calc-btn, #copy-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: background 0.2s;
    }
    #calc-btn { background-color: #3182ce; color: white; }
    #calc-btn:hover { background-color: #2b6cb0; }
    #copy-btn { background-color: #1da1f2; color: white; margin-top: 15px; }
    #copy-btn:hover { background-color: #4ab3f4; }

    .result-box {
      display: none;
      background-color: #12161a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      text-align: left;
      border: 1px solid #2d3748;
    }
    .result-box-title { font-weight: bold; color: #fff; font-size: 14px; margin-bottom: 10px; border-left: 4px solid #2ecc71; padding-left: 8px; }
    .result-value { font-size: 13px; margin-bottom: 8px; color: #cbd5e0; }
    .highlight { color: #e53e3e; font-weight: bold; font-size: 16px; }
    .unearned { color: #38a169; font-weight: bold; font-size: 16px; }

    .ad-space-box {
      width: 100%; max-width: 440px; background-color: #1a202c; border: 2px dashed #2d3748; border-radius: 12px; padding: 15px; text-align: center; color: #718096; margin-top: 20px; box-sizing: border-box;
    }
    .ad-label { font-size: 10px; font-weight: bold; color: #4a5568; margin-bottom: 5px; }
    .ad-text { font-size: 11px; color: #718096; line-height: 1.4; }

    .footer-link { text-align: center; margin-top: 20px; font-size: 12px; }
    .footer-link a { color: #3182ce; text-decoration: none; font-weight: bold; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <h1>💰 未来貯金シミュレーター 2.5</h1>
  
  <div class="section-title">🎯 目標設定</div>
  <label>目標金額（投資＋現金の合算目標）</label>
  <div class="input-group">
    <input type="number" id="target-input" value="1000" min="0">
    <span class="unit">万円</span>
  </div>

  <div class="section-title">💸 毎月の収支プラン</div>
  <label>毎月の手取り収入</label>
  <div class="input-group">
    <input type="number" id="income-input" value="40" min="0">
    <span class="unit">万円</span>
  </div>

  <label>固定費・生活費（家賃・食費・光熱費など）</label>
  <div class="input-group">
    <input type="number" id="living-input" value="15" min="0">
    <span class="unit">万円</span>
  </div>

  <label>趣味・消費（自由な遊び代など）</label>
  <div class="input-group">
    <input type="number" id="hobby-input" value="5" min="0">
    <span class="unit">万円</span>
  </div>

  <!-- 【新設・完全分離】投資枠と現金貯金枠の割り振りを客が自由に指定可能 -->
  <div class="section-title">🛡️ 未来への割り振り（残りの余剰金から自動計算）</div>
  <label>余ったお金のうち【毎月の積立投資額】に回す分</label>
  <div class="input-group">
    <input type="number" id="invest-input" value="15" min="0">
    <span class="unit">万円</span>
  </div>

  <label>想定年利（新NISAなど積立運用の利回り）</label>
  <div class="input-group">
    <input type="number" id="rate-input" value="5" min="0" step="0.1">
    <span class="unit">％</span>
  </div>

  <button id="calc-btn">投資と貯金を分けて一瞬で将来計算！</button>

  <!-- 計算結果出力ボックス -->
  <div id="result-box" class="result-box">
    <div class="result-box-title">シミュレーション結果</div>
    
    <div class="result-value">毎月の安全な【現金貯金】の額: <span id="res-cash-monthly" style="font-weight:bold; color:#e67e22;">0</span> 万円 / 月</div>
    <div class="result-value">🎯 目標金額までの到達期間: <span id="res-years" class="highlight">0</span> 年</div>
    
    <div class="result-value" style="border-top: 1px dashed #2d3748; padding-top: 8px; margin-top: 8px;">
      ・手元に残った【現金貯金】の総額: <span id="res-pure-cash" style="font-weight:bold;">0</span> 万円<br>
      ・新NISA等で増えた【投資資産】の総額: <span id="res-invest-total" style="font-weight:bold; color:#3182ce;">0</span> 万円
    </div>
    
    <div class="result-value" style="border-top: 1px dashed #2d3748; padding-top: 10px; margin-top: 10px;">
      🌿 達成後の毎月の不労所得（投資額の年利4%換算）: <span id="res-unearned" class="unearned">0</span> 万円 / 月
    </div>
    
    <button id="copy-btn">この結果をコピーして不労所得計画を報告 📋</button>
  </div>
</div>

<!-- 将来の不労所得用広告スペース -->
<div class="ad-space-box">
  <div class="ad-label">Sponsored</div>
  <div class="ad-text">※当サイトは開発費・サーバー維持費のために広告を掲載予定です。</div>
</div>

<!-- ココアさんの公式看板リンク -->
<div class="footer-link">
  開発者：<a href="https://x.com" target="_blank">ココア (@cocoa_next7)</a>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const targetInput = document.getElementById("target-input");
    const incomeInput = document.getElementById("income-input");
    const livingInput = document.getElementById("living-input");
    const hobbyInput = document.getElementById("hobby-input");
    const investInput = document.getElementById("invest-input");
    const rateInput = document.getElementById("rate-input");
    
    const calcBtn = document.getElementById("calc-btn");
    const resultBox = document.getElementById("result-box");
    
    const resCashMonthly = document.getElementById("res-cash-monthly");
    const resYears = document.getElementById("res-years");
    const resPureCash = document.getElementById("res-pure-cash");
    const resInvestTotal = document.getElementById("res-invest-total");
    const resUnearned = document.getElementById("res-unearned");
    const copyBtn = document.getElementById("copy-btn");

    let shareText = "";

    calcBtn.addEventListener("click", () => {
      const target = parseFloat(targetInput.value) || 0;
      const income = parseFloat(incomeInput.value) || 0;
      const living = parseFloat(livingInput.value) || 0;
      const hobby = parseFloat(hobbyInput.value) || 0;
      const investMonthly = parseFloat(investInput.value) || 0;
      const annualRate = parseFloat(rateInput.value) || 0;

      // 手取りから生活費・趣味代・投資額を引き、残った分を「現金貯金」として算出
      const totalOut = living + hobby + investMonthly;
      const cashMonthly = income - totalOut;

      if (target <= 0 || income <= 0) {
        alert("⚠️ 目標金額と手取り収入を正しく入力してください！");
        return;
      }
      if (totalOut > income) {
        alert("🚨 生活費＋趣味代＋投資額が手取りを超えています！収支を見直してください！");
        return;
      }

      const monthlyRate = (annualRate / 100) / 12;
      let currentInvestAsset = 0;
      let currentCashAsset = 0;
      let monthsCount = 0;

      // 投資額（複利）＋ 現金貯金（そのまま加算）の合計が目標に届くまでループ
      while ((currentInvestAsset + currentCashAsset) < target && monthsCount < 1200) {
        // 投資分は月利をかけて増やす
        if (monthlyRate > 0) {
          currentInvestAsset = (currentInvestAsset + investMonthly) * (1 + monthlyRate);
        } else {
          currentInvestAsset += investMonthly;
        }
        // 現金貯金分は複利をかけずにそのまま積み上げ
        currentCashAsset += cashMonthly;
        monthsCount++;
      }

      const calcYears = (monthsCount / 12).toFixed(1);

      // 達成時の投資資産から毎月の不労所得（4%ルール）を計算
      const unearnedMonthly = (currentInvestAsset * 0.04) / 12;

      // 画面の各欄へ反映
      resCashMonthly.innerText = cashMonthly.toLocaleString();
      resYears.innerText = calcYears;
      resPureCash.innerText = Math.round(currentCashAsset).toLocaleString();
      resInvestTotal.innerText = Math.round(currentInvestAsset).toLocaleString();
      resUnearned.innerText = Math.round(unearnedMonthly).toLocaleString();

      shareText = `【未来貯金シミュレーター結果】\n` +
                  `目標${target}万に向け毎月投資${investMonthly}万(利回り${annualRate}%)＋現金貯金${cashMonthly}万\n` +
                  `・達成期間: ${calcYears}年\n` +
                  `・貯まった現金: ${Math.round(currentCashAsset).toLocaleString()}万円\n` +
                  `・投資運用残高: ${Math.round(currentInvestAsset).toLocaleString()}万円🔥\n` +
                  `・毎月の不労所得: 約${Math.round(unearnedMonthly).toLocaleString()}万円/月\n` +
                  `アプデ後もURLは一生同じ！`;

      resultBox.style.display = "block";
    });

    copyBtn.addEventListener("click", () => {
      if (!shareText) return;
      navigator.clipboard.writeText(shareText).then(() => {
        alert("📋 現金と投資を分けた最強の不労所得計画をコピーしました！");
      }).catch(() => {
        alert("⚠️ コピーに失敗しました。");
      });
    });
